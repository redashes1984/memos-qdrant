# memos-local-plugin — Hermes runtime configuration
#
# Keep this file short. Most plugin behavior is controlled by sensible
# defaults baked into the code; only the fields below are likely to change
# per user. If you need to tune an advanced option (algorithm thresholds,
# log rotation, retrieval budgets, etc.) see docs/CONFIG-ADVANCED.md —
# any field there can be added to this file and will take effect on reload.
#
# Sensitive fields (apiKey, teamToken, userToken) live HERE — there is no
# .env file. install.sh sets this file's mode to 600.

version: 1

viewer:
  port: 18799

embedding:
  provider: openai_compatible   # local | openai_compatible | gemini | cohere | voyage | mistral
  endpoint: http://10.10.4.81:8003   # Embedding service endpoint
  dimensions: 1024                 # Qwen3-Embedding-0.6B output dimension
  apiKey: ""

llm:
  # Hermes has no "host LLM", so pick a real provider.
  provider: openai_compatible
  apiKey: ""              # REQUIRED — fill in before running
  model: ""               # blank = provider default (e.g. gpt-4o-mini for openai_compatible)

storage:
  vectorBackend: qdrant     # sqlite | qdrant
  qdrant:
    url: http://10.10.4.79:6333
    apiKey: "fe31c60ab511a0f87ea6309d8523b3182a11132492bfc2fda0dfbe6e7fbda6f6"
    collectionPrefix: memos
    timeoutMs: 10000
    maxRetries: 3

reranker:
  enabled: true
  endpoint: http://10.10.4.81:8004   # Reranker service endpoint
  model: reranker
  topN: 10
  timeoutMs: 30000
  maxRetries: 3

hub:
  enabled: false
  address: ""
  teamToken: ""
  userToken: ""

telemetry:
  enabled: true

logging:
  level: info             # trace | debug | info | warn | error | fatal
